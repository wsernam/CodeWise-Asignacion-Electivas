_format_version: "3.0"
_transform: true

# ==================================================
# SERVICIO: Gestión de Asignación
# ==================================================
services:
  - name: gestion-asignacion-service
    url: http://gestion-asignacion:8000
    protocol: http
    host: gestion-asignacion
    port: 8000
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    
    # ==================================================
    # RUTAS DEL SERVICIO
    # ==================================================
    routes:
      - name: gestion-asignacion-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /gestion-asignacion
        strip_path: true
        preserve_host: false
    
    # ==================================================
    # PLUGINS DEL SERVICIO
    # ==================================================
    plugins:
      # ------------------------------------------------
      # Plugin JWT - Validación de Tokens
      # ------------------------------------------------
      - name: jwt
        enabled: true
        config:
          # URI donde se busca el token (header Authorization)
          uri_param_names:
            - jwt
          # Nombres de cookies donde buscar el token (opcional)
          cookie_names: []
          # Nombres de headers donde buscar el token
          header_names:
            - authorization
          # Claims a incluir en los headers enviados al upstream
          claims_to_verify:
            - exp
          # Tiempo máximo de vida del token (opcional, en segundos)
          maximum_expiration: 31536000
          # Algoritmos permitidos
          key_claim_name: iss
          secret_is_base64: false
          anonymous: null
          run_on_preflight: true
      
      # ------------------------------------------------
      # Plugin CORS (opcional pero recomendado)
      # ------------------------------------------------
      - name: cors
        enabled: true
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
            - X-Auth-Token
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
          preflight_continue: false
      
      # ------------------------------------------------
      # Plugin Rate Limiting (opcional pero recomendado)
      # ------------------------------------------------
      - name: rate-limiting
        enabled: true
        config:
          second: 100
          minute: null
          hour: 10000
          day: null
          month: null
          year: null
          limit_by: consumer
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          redis_ssl: false
          redis_ssl_verify: false
          redis_timeout: 2000
          redis_database: 0
      
      # ------------------------------------------------
      # Plugin Request Transformer (opcional)
      # Agrega headers personalizados al upstream
      # ------------------------------------------------
      - name: request-transformer
        enabled: true
        config:
          add:
            headers:
              - X-Gateway:Kong
              - X-Service:gestion-asignacion

# ==================================================
# CONSUMIDORES (ISSUERS) DE JWT
# ==================================================
consumers:
  - username: auth-hs256
    custom_id: django-auth-service
    
    # ------------------------------------------------
    # Credenciales JWT para este consumidor
    # ------------------------------------------------
    jwt_secrets:
      - key: auth-hs256
        algorithm: HS256
        secret: ab3750eadf31526430c6b7242b8ebf1cda010443c77130350d0a11c8e7ea360d
        # El campo 'key' debe coincidir con el claim 'iss' del token
        # El 'secret' es tu JWT_SIGNING_KEY de Django

# ==================================================
# PLUGINS GLOBALES (Aplicados a todos los servicios)
# ==================================================
plugins:
  # ------------------------------------------------
  # Correlation ID - Para trazabilidad de requests
  # ------------------------------------------------
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  # ------------------------------------------------
  # Request Size Limiting - Limitar tamaño de requests
  # ------------------------------------------------
  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  # ------------------------------------------------
  # Response Transformer - Agregar headers de seguridad
  # ------------------------------------------------
  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - X-XSS-Protection:1; mode=block