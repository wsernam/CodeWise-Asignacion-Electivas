_format_version: "3.0"
_transform: true


# ==================================================
# SERVICIO: Gestión de Asignación
# ==================================================
services:
  - name: gestion-asignacion-service
    url: http://gestion-asignacion:8000
    protocol: http
    host: gestion-asignacion
    port: 8000
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    
    routes:
      - name: gestion-asignacion-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /gestion-asignacion
        strip_path: true
        preserve_host: false
    
    plugins:
      - name: jwt
        enabled: true
        config:
          uri_param_names:
            - jwt
          cookie_names: []
          header_names:
            - authorization
          claims_to_verify:
            - exp
          maximum_expiration: 31536000
          key_claim_name: iss
          secret_is_base64: false
          anonymous: null
          run_on_preflight: true
      
      - name: pre-function
        enabled: true
        config:
          access:
            - |
              local jwt = kong.ctx.shared.jwt_keyset_credential
              
              if jwt and jwt.claims then
                if jwt.claims.role then
                  kong.service.request.set_header("X-User-Role", jwt.claims.role)
                end
                
                if jwt.claims.user_id then
                  kong.service.request.set_header("X-User-Id", jwt.claims.user_id)
                end
                
                kong.log.info("JWT Claims extraídos - Role: ", jwt.claims.role, ", User ID: ", jwt.claims.user_id)
              end
      
      - name: cors
        enabled: true
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
            - X-Auth-Token
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
          preflight_continue: false
      
      - name: rate-limiting
        enabled: true
        config:
          second: 100
          minute: null
          hour: 10000
          day: null
          month: null
          year: null
          limit_by: consumer
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          redis_ssl: false
          redis_ssl_verify: false
          redis_timeout: 2000
          redis_database: 0

# ==================================================
# SERVICIO: Autenticación (JWT)
# ==================================================
  - name: auth-service
    url: http://seguridad:8000
    protocol: http
    host: seguridad
    port: 8000
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000

    routes:
      - name: auth-login-route
        protocols:
          - http
          - https
        methods:
          - POST
          - OPTIONS
        paths:
          - /auth/login
        strip_path: true      # Cambiado a 'false'
        preserve_host: false    # Cambiado a 'true' para mejor consistencia

    plugins:
      - name: cors
        config:
          origins:
            - "*"
      - name: request-transformer
        enabled: true
        config:
          replace:
            uri: /api/login/ # Reemplaza la ruta de la petición por la que espera Django

