_format_version: "3.0"
_transform: true

# ==================================================
# SERVICIO: Gestión de Asignación
# ==================================================
services:
  - name: gestion-asignacion-service
    url: http://gestion-asignacion:8000
    protocol: http
    host: gestion-asignacion
    port: 8000
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    
    # ==================================================
    # RUTAS DEL SERVICIO
    # ==================================================
    routes:
      - name: gestion-asignacion-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /gestion-asignacion
        strip_path: true
        preserve_host: false
    
    # ==================================================
    # PLUGINS DEL SERVICIO
    # ==================================================
    plugins:
      # ------------------------------------------------
      # Plugin JWT - Validación de Tokens
      # ------------------------------------------------
      - name: jwt
        enabled: true
        config:
          uri_param_names:
            - jwt
          cookie_names: []
          header_names:
            - authorization
          claims_to_verify:
            - exp
          maximum_expiration: 31536000
          key_claim_name: iss
          secret_is_base64: false
          anonymous: null
          run_on_preflight: true
      
      # ------------------------------------------------
      # Plugin Pre-function
      # Extrae los claims del JWT y los agrega como headers
      # ------------------------------------------------
      - name: pre-function
        enabled: true
        config:
          access:
            - |
              -- Extraer los claims del JWT validado
              local jwt = kong.ctx.shared.jwt_keyset_credential
              
              if jwt and jwt.claims then
                -- Agregar el rol como header
                if jwt.claims.role then
                  kong.service.request.set_header("X-User-Role", jwt.claims.role)
                end
                
                -- Agregar el user_id como header
                if jwt.claims.user_id then
                  kong.service.request.set_header("X-User-Id", jwt.claims.user_id)
                end
                
                -- Log para debugging (opcional)
                kong.log.info("JWT Claims extraídos - Role: ", jwt.claims.role, ", User ID: ", jwt.claims.user_id)
              end
      
      # ------------------------------------------------
      # Plugin CORS
      # ------------------------------------------------
      - name: cors
        enabled: true
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
            - X-Auth-Token
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
          preflight_continue: false
      
      # ------------------------------------------------
      # Plugin Rate Limiting
      # ------------------------------------------------
      - name: rate-limiting
        enabled: true
        config:
          second: 100
          minute: null
          hour: 10000
          day: null
          month: null
          year: null
          limit_by: consumer
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          redis_ssl: false
          redis_ssl_verify: false
          redis_timeout: 2000
          redis_database: 0

# ==================================================
# CONSUMIDORES (ISSUERS) DE JWT
# ==================================================
consumers:
  - username: auth-hs256
    custom_id: django-auth-service
    
    jwt_secrets:
      - key: auth-hs256
        algorithm: HS256
        secret: ab3750eadf31526430c6b7242b8ebf1cda010443c77130350d0a11c8e7ea360d

# ==================================================
# PLUGINS GLOBALES
# ==================================================
plugins:
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - X-XSS-Protection:1; mode=block