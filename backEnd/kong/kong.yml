# ==================================================
# CONSUMIDORES (ISSUERS) DE JWT
# ==================================================
consumers:
  - username: auth-hs256
    custom_id: django-auth-service
    
    jwt_secrets:
      - key: auth-hs256
        algorithm: HS256
        secret: ab3750eadf31526430c6b7242b8ebf1cda010443c77130350d0a11c8e7ea360d

# ==================================================
# PLUGINS GLOBALES
# ==================================================
plugins:
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - X-XSS-Protection:1; mode=block