services:
  # -------------------------------
  # Servicio base de Datos de USUARIOS (MySQL)
  # -------------------------------
  db_usuarios:
    image: mysql:8.0 # Imagen oficial de MySQL versión 8.0
    container_name: db_usuarios # Nombre del contenedor (visible en Docker)
    restart: always # Reinicia el contenedor automáticamente si se detiene
    env_file:
      - .env # Archivo .env con variables de entorno
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME} # Nombre de la base de datos (definido en .env)
      MYSQL_USER: ${AUTH_DB_USER} # Usuario de la base de datos (definido en .env)
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD} # Contraseña del usuario (definida en .env)
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_PASSWORD} # Contraseña del root (requerida por MySQL)
    volumes:
      - volumen_db_usuarios:/var/lib/mysql # Monta un volumen persistente en /var/lib/mysql TODOS USAR TAMBIEN /var/lib/mysql POR CONVENCIÓN
    ports:
      - "3306:3306" # Expone el puerto 3306 (MySQL) para acceso desde fuera del contenedor
    # IMPORTANTE Healthcheck para asegurarse de que MySQL esté listo antes de que Django intente conectarse
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "db_usuarios",
          "-u${AUTH_DB_USER}",
          "-p${AUTH_DB_PASSWORD}",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: --host_cache_size=0

  # -------------------------------
  # Servicio para la base de datos FORMULARIO
  # -------------------------------
  db_formulario:
    image: mysql:8.0
    container_name: db_formulario
    restart: always # Reinicia el contenedor automáticamente si se detiene
    env_file:
      - .env # Archivo .env con variables de entorno
    environment:
      MYSQL_DATABASE: ${FORM_DB_NAME}
      MYSQL_USER: ${FORM_DB_USER}
      MYSQL_PASSWORD: ${FORM_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${FORM_DB_ROOT_PASSWORD}
    volumes:
      - volumen_db_formulario:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "db_formulario",
          "-u${FORM_DB_USER}",
          "-p${FORM_DB_PASSWORD}",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: --host_cache_size=0
  # -------------------------------
  # Servicio para la base de datos ASIGNACION
  # -------------------------------

  db_asignacion:
    image: mysql:8.0
    container_name: db_asignacion
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${ASIGNACION_DB_NAME}
      MYSQL_USER: ${ASIGNACION_DB_USER}
      MYSQL_PASSWORD: ${ASIGNACION_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ASIGNACION_DB_ROOT_PASSWORD}
    volumes:
      - volumen_db_asignacion:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "db_asignacion",
          "-u${ASIGNACION_DB_USER}",
          "-p${ASIGNACION_DB_PASSWORD}",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: --host_cache_size=0

  # -------------------------------
  # Microservicio de seguridad (JWT)
  # -------------------------------
  seguridad:
    build:
      context: ./servicio_seguridad_jwt # Ruta donde está el servicio y su Dockerfile
      dockerfile: Dockerfile # Nombre del Dockerfile a usar
    container_name: seguridad_service # Nombre del contenedor para el microservicio
    volumes:
      - ./servicio_seguridad_jwt:/app # Monta todo el proyecto en /app dentro del contenedor
        # IMPORTANTE: usar la misma convención en todos los microservicios
    ports:
      - "8003:8000" # Expone el puerto 8000 para acceder al servicio de seguridad
    env_file:
      - ./servicio_seguridad_jwt/.env # Archivo .env con variables de configuración
    depends_on:
      db_usuarios:
        condition: service_healthy # IMPORTANTE  Espera a que la base de datos esté saludable

  # -------------------------------
  # Microservicio GESTION DE FORMULARIO
  # -------------------------------
  gestion_formulario:
    build:
      context: ./gestion-formulario
      dockerfile: Dockerfile
    container_name: gestion_formulario
    volumes:
      - ./gestion-formulario:/app # Monta todo el proyecto en /app dentro del contenedor
        # IMPORTANTE: usar la misma convención en todos los microservicios
    ports:
      - "8002:8000" # Expone el puerto 8002 para acceder al servicio

    env_file:
      - .env
    environment:
      DB_NAME: ${FORM_DB_NAME}
      DB_USER: ${FORM_DB_USER}
      DB_PASSWORD: ${FORM_DB_PASSWORD}
      DB_HOST: ${FORM_DB_HOST}
      DB_PORT: ${FORM_DB_PORT}
      #__________________________________
      #RABBITMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_DLX: ${RABBITMQ_DLX}
      #__________________________________

    depends_on:
      db_formulario:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    command: >
      sh -c "
      python manage.py migrate && 
      sh datosBase.sh &&
      python manage.py runserver 0.0.0.0:8000
      "

  # -------------------------------
  #MICROSERVICIO GESTION DE ASIGNACION
  # -------------------------------
  gestion-asignacion:
    build:
      context: ./gestion-asignacion
      dockerfile: Dockerfile
    container_name: gestion-asignacion
    volumes:
      - ./gestion-asignacion:/app # Monta todo el proyecto en /app dentro del contenedor
        # IMPORTANTE: usar la misma convención en todos los microservicios

    #SE ELIMINA EL PUERTO EXPUESTO PARA QUE SOLO SEA ACCESIBLE VIA KONG UWU
      
    env_file:
      - .env
    environment:
      DB_NAME: ${ASIGNACION_DB_NAME}
      DB_USER: ${ASIGNACION_DB_USER}
      DB_PASSWORD: ${ASIGNACION_DB_PASSWORD}
      DB_HOST: ${ASIGNACION_DB_HOST}
      DB_PORT: ${ASIGNACION_DB_PORT}
      #__________________________________
      #RABBITMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_DLX: ${RABBITMQ_DLX}
      Q_EST: ${Q_EST}
      Q_PROG: ${Q_PROG}
      Q_ELEC: ${Q_ELEC}
      Q_OFER: ${Q_OFER}
      Q_OFER_UPD: ${Q_OFER_UPD}
      Q_OFER_DEL: ${Q_OFER_DEL}
      Q_SEL: ${Q_SEL}
      #__________________________________

    depends_on:
      db_asignacion:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    command: >
      sh -c "
      echo 'Esperando a que el servicio de formulario inicialice los datos...' &&
      sleep 15 &&
      echo 'Ejecutando migraciones y sincronización de datos...' &&
      python manage.py migrate && 
      python manage.py sync_databases &&
      echo 'Iniciando consumidor de RabbitMQ en segundo plano...' &&
      python manage.py run_consumer & 
      python manage.py runserver 0.0.0.0:8000
      "
#--------------------------------
#   Micro de notificaciones
#--------------------------------
  servicio_envio_notificaciones:

    build:
      context: ./servicio_envio_notificaciones 
      dockerfile: Dockerfile
    container_name: servicio_notificaciones
    depends_on:
      - rabbitmq
    command: >
      sh -c " python -u ./notificacion/config_rabbit.py &  python -u manage.py migrate && python -u manage.py runserver 0.0.0.0:8002 "
    ports:
      - "8002:8002"
    restart: unless-stopped

    env_file:
      - .env
    environment:
      #__________________________________
      #RABBITMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_DLX: ${RABBITMQ_DLX}
  
  # -------------------------------
  # RABBITMQ
  # -------------------------------
  rabbitmq:
    image: "rabbitmq:3-management" # Imagen oficial de RabbitMQ con plugin de gestión
    container_name: rabbitmq # Nombre del contenedor
    ports:
      - "5672:5672" # Puerto para conexiones AMQP
      - "15672:15672" # Puerto para la interfaz de gestión web
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest} # Usuario por defecto (definido en .env o 'guest')
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest} # Contraseña por defecto (definida en .env o 'guest')
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq # Volumen persistente para datos de RabbitMQ

# ---------------------------------------
# PostgreSQL para Kong
# ---------------------------------------
  kong-database:
    image: postgres:14
    container_name: kong_database
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB_KONG}
      POSTGRES_USER: ${POSTGRES_USER_KONG}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_KONG}
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ---------------------------------------
  # Kong Migrations (ejecutar migraciones primero)
  # ---------------------------------------
  kong-migrations:
    image: kong:3.6
    container_name: kong_migrations
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${POSTGRES_HOST_KONG}
      KONG_PG_USER: ${POSTGRES_USER_KONG}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD_KONG}
      KONG_PG_DATABASE: ${POSTGRES_DB_KONG}
    command: kong migrations bootstrap
    restart: "no"  # Cambiar a "no" para que no se reinicie constantemente

  # ---------------------------------------
  # KONG (API Gateway)
  # ---------------------------------------
  kong:
    image: kong:3.6
    container_name: kong
    restart: always
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully  # Esperar a que migrations termine
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${POSTGRES_HOST_KONG}
      KONG_PG_USER: ${POSTGRES_USER_KONG}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD_KONG}
      KONG_PG_DATABASE: ${POSTGRES_DB_KONG}
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - "8000:8000" # Proxy
      - "8001:8001" # Admin API
    volumes:
      - ./kong/kong.yml:/opt/kong/deck/kong.yml
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------
  # Cargar deck automáticamente
  # ---------------------------------------
  deck-init:
    image: kong/deck:latest
    container_name: deck_init
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - ./kong/kong.yml:/deck/kong.yml
    entrypoint: >
      sh -c "
      echo 'Kong está listo, aplicando configuración...' &&
      if deck diff -s /deck/kong.yml --kong-addr=http://kong:8001 2>/dev/null | grep -q 'no changes'; then
        echo 'Configuración ya aplicada, no se hace nada.';
      else
        echo 'Aplicando cambios de configuración...' &&
        deck sync -s /deck/kong.yml --kong-addr=http://kong:8001;
      fi &&
      echo 'Deck sincronizado exitosamente.'
      "
    restart: "no"

# -------------------------------
# Definición de volúmenes persistentes
# -------------------------------
volumes:
  volumen_db_usuarios:
  volumen_db_formulario:
  volumen_db_asignacion:
  rabbitmq_data:
  kong_db_data: