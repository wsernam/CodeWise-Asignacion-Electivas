# ============================================================
# Este archivo docker-compose.yml define dos servicios:
# 1. Una base de datos MySQL para almacenar usuarios.
# 2. Un microservicio de seguridad (JWT) que se conecta a la base de datos.
# Además, configura un volumen para persistir los datos de la base de datos.
# ============================================================

services:
  # -------------------------------
  # Servicio para la base de datos (MySQL)
  # -------------------------------
  db_usuarios:
    image: mysql:8.0               # Imagen oficial de MySQL versión 8.0
    container_name: db_usuarios    # Nombre del contenedor (visible en Docker)
    restart: always                # Reinicia el contenedor automáticamente si se detiene
    env_file:
      - .env  # Archivo .env con variables de entorno
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}        # Nombre de la base de datos (definido en .env)
      MYSQL_USER: ${AUTH_DB_USER}            # Usuario de la base de datos (definido en .env)
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}    # Contraseña del usuario (definida en .env)
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_PASSWORD}  # Contraseña del root (requerida por MySQL)
    volumes:
      - volumen_db_usuarios:/var/lib/mysql # Monta un volumen persistente en /var/lib/mysql TODOS USAR TAMBIEN /var/lib/mysql POR CONVENCIÓN 
    ports:
      - "3306:3306"  # Expone el puerto 3306 (MySQL) para acceso desde fuera del contenedor
    # IMPORTANTE Healthcheck para asegurarse de que MySQL esté listo antes de que Django intente conectarse
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db_usuarios", "-u${AUTH_DB_USER}", "-p${AUTH_DB_PASSWORD}"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s

  # -------------------------------
  # Microservicio de seguridad (JWT)
  # -------------------------------
  seguridad:
    build:
      context: ./servicio_seguridad_jwt  # Ruta donde está el servicio y su Dockerfile
      dockerfile: Dockerfile             # Nombre del Dockerfile a usar
    container_name: seguridad_service    # Nombre del contenedor para el microservicio
    volumes:
      - ./servicio_seguridad_jwt:/app   # Monta todo el proyecto en /app dentro del contenedor
                 # IMPORTANTE: usar la misma convención en todos los microservicios
    ports:
      - "8000:8000"  # Expone el puerto 8000 para acceder al servicio de seguridad
    env_file:
      - ./servicio_seguridad_jwt/.env  # Archivo .env con variables de configuración
    depends_on:
      db_usuarios:
        condition: service_healthy  # IMPORTANTE  Espera a que la base de datos esté saludable

# -------------------------------
# Definición de volúmenes persistentes
# -------------------------------
volumes:
  volumen_db_usuarios:  # Volumen nombrado para almacenar datos de MySQL
